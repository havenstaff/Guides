<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Haven Guides</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    h1 {
      text-align: center;
      margin: 15px 0;
      font-size: 32px;
    }

    .layout {
      display: flex;
      flex: 1;
    }

    .side {
      width: 20%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .center {
      width: 60%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    iframe {
      width: 95%;
      height: 85%;
      border: none;
      border-radius: 12px;
      background: #111;
    }

    .btn {
      width: 180px;
      padding: 15px;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
      box-shadow: 0 0 15px rgba(255,255,255,0.05);
    }

    .btn:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #334155, #1e293b);
      box-shadow: 0 0 20px rgba(255,255,255,0.15);
    }

    .label {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: -10px;
    }
  </style>
</head>
<body>

  <h1>Haven Guides</h1>

  <div class="layout">

    <!-- IZQUIERDA (RANKS) -->
    <div class="side">
      <div class="label">RANKS</div>

      <div class="btn" onclick="loadDoc('https://docs.google.com/document/d/1e4u3n29qw3avHxDVMx-0ondeAHhZJ5N4UJt_1lxP5v4/preview')">
        [ESP] Ranks Guide
      </div>

      <div class="btn" onclick="loadDoc('https://docs.google.com/document/d/1Fhn8Ptubv6v_bug9gnoeAOyduOmRtxJPOZcwpyTTlOc/preview')">
        [ENG] Ranks Guide
      </div>
    </div>

    <!-- CENTRO -->
    <div class="center">
      <iframe id="viewer" src=""></iframe>
    </div>

    <!-- DERECHA (STAFF) -->
    <div class="side">
      <div class="label">STAFF</div>

      <div class="btn" onclick="loadDoc('https://docs.google.com/document/d/1RBmuicXwjWJVxyGsf2DIOqxA1DGuNjJgEnHGOjdAutE/preview')">
        [ESP] Staff Guide
      </div>

      <div class="btn" onclick="loadDoc('https://docs.google.com/document/d/1KQqM_dcDfT7kvxHq9UahjMafbES53sVYR19HXupoZuM/preview')">
        [ENG] Staff Guide
      </div>
    </div>

  </div>

  <script>
    function loadDoc(url) {
      document.getElementById("viewer").src = url;
    }
  </script>

</body>
</html>
