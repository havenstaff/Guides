<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Haven Guides</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #000;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    h1 {
      text-align: center;
      margin-top: 40px;
      margin-bottom: 10px;
      font-size: 40px;
      font-weight: 800;
      color: #a855f7;
      text-shadow: 0 0 20px rgba(168,85,247,0.7);
    }

    .layout {
      display: flex;
      flex: 1;
    }

    .side {
      width: 25%; /* antes 20% */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 35px;
    }

    .center {
      width: 50%; /* antes 60% */
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    iframe {
      width: 95%;
      height: 85%;
      border: none;
      border-radius: 14px;
      background: #111;
      display: none;
    }

    .logo {
      width: 320px;
      opacity: 0.95;
    }

    .btn {
      width: 230px;
      padding: 18px;
      background: linear-gradient(135deg, #a855f7, #ffffff);
      color: black;
      border-radius: 16px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 0 25px rgba(168,85,247,0.5);
    }

    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 35px rgba(168,85,247,0.9);
    }
  </style>
</head>
<body>

  <h1>Haven Guides</h1>

  <div class="layout">

    <!-- IZQUIERDA -->
    <div class="side">
      <div class="btn" onclick="loadDoc('https://docs.google.com/document/d/1e4u3n29qw3avHxDVMx-0ondeAHhZJ5N4UJt_1lxP5v4/preview')">
        [ESP] Ranks Guide
      </div>

      <div class="btn" onclick="loadDoc('https://docs.google.com/document/d/1Fhn8Ptubv6v_bug9gnoeAOyduOmRtxJPOZcwpyTTlOc/preview')">
        [ENG] Ranks Guide
      </div>

      <div class="btn" onclick="loadDoc('https://docs.google.com/document/d/1R4Ar94kxa-JpuwY6MMjyCy4Upn8A9C_g3y9Q8_f2CoA/preview')">
        [ESP] Disabled Services Guide
      </div>
    </div>

    <!-- CENTRO -->
    <div class="center">
      <img src="final_logo-1.png" id="logo" class="logo">
      <iframe id="viewer"></iframe>
    </div>

    <!-- DERECHA -->
    <div class="side">
      <div class="btn" onclick="loadDoc('https://docs.google.com/document/d/1RBmuicXwjWJVxyGsf2DIOqxA1DGuNjJgEnHGOjdAutE/preview')">
        [ESP] Staff Guide
      </div>

      <div class="btn" onclick="loadDoc('https://docs.google.com/document/d/1KQqM_dcDfT7kvxHq9UahjMafbES53sVYR19HXupoZuM/preview')">
        [ENG] Staff Guide
      </div>

      <div class="btn" onclick="loadDoc('https://docs.google.com/document/d/1V32U32VPpGX2KgUTVfG1kdpiBhQEvikRwRHI2QKWwTs/preview')">
        [ENG] Disabled Services Guide
      </div>
    </div>

  </div>

  <script>
    function loadDoc(url) {
      document.getElementById("viewer").src = url;
      document.getElementById("viewer").style.display = "block";
      document.getElementById("logo").style.display = "none";
    }
  </script>

</body>
</html>
